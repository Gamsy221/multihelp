<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Test Replica</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Interactive Practice Test</p>
        <h1>Multiplication Test Replica</h1>
        <p class="intro">Work through each times-table section one at a time, race the timer, and see how many groups you can finish perfectly.</p>
      </div>
      <div class="actions">
        <button id="generate-button" type="button">Generate New Test</button>
        <button id="print-button" type="button">Print</button>
      </div>
    </header>

    <section id="overall-results" class="overall-results hidden" aria-live="polite">
      <h2>Final Score</h2>
      <p id="overall-problems" class="overall-score"></p>
      <p id="overall-groups" class="overall-score"></p>
    </section>

    <main id="worksheet" class="worksheet" aria-label="Multiplication worksheet"></main>
  </div>

  <template id="group-template">
    <section class="times-group" data-state="locked">
      <div class="group-header">
        <div>
          <div class="group-label"></div>
          <p class="group-note">Start the timer to unlock this section.</p>
        </div>
        <div class="group-status">
          <span class="status-pill">Locked</span>
          <span class="section-check hidden" aria-hidden="true">&#10003;</span>
        </div>
      </div>
      <div class="group-controls">
        <span class="timer-display" aria-live="polite">1:25</span>
        <button class="start-button" type="button">Start Timer</button>
        <button class="finish-button hidden" type="button">Check/Finish</button>
      </div>
      <div class="group-feedback" aria-live="polite"></div>
      <div class="problem-grid"></div>
    </section>
  </template>

  <template id="problem-template">
    <article class="problem" aria-label="Multiplication problem">
      <div class="problem-stack">
        <div class="factor factor-top"></div>
        <div class="factor factor-bottom">
          <span class="operator">x</span>
          <span class="factor-value"></span>
        </div>
        <div class="answer-bar" aria-hidden="true"></div>
        <label class="answer-field">
          <span class="sr-only">Answer</span>
          <input class="answer-input" type="text" inputmode="numeric" autocomplete="off" disabled>
        </label>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
